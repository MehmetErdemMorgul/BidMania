global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'bidmania-system'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'bidmania.dispatcher:8080'
          - 'bidmania.authservice:8080'
          - 'bidmania.auctionservice:8080'
          - 'bidmania.productservice:8080'