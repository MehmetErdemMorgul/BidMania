version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: bidmania_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  bidmania.dispatcher:
    build:
      context: .
      dockerfile: BidMania.Dispatcher/Dockerfile
    container_name: bidmania-dispatcher
    ports:
      - "5147:8080"
    depends_on:
      - bidmania.authservice
      - bidmania.productservice

  bidmania.authservice:
    build:
      context: .
      dockerfile: BidMania.AuthService/Dockerfile
    container_name: bidmania-authservice
    environment:
      - ConnectionStrings__DefaultConnection=mongodb://mongodb:27017
      - DatabaseSettings__DatabaseName=AuthDb
      - DatabaseSettings__UserCollectionName=Users
    depends_on:
      - mongodb

  bidmania.productservice:
    build:
      context: .
      dockerfile: BidMania.ProductService/Dockerfile
    container_name: bidmania-productservice
    environment:
      - ConnectionStrings__DefaultConnection=mongodb://mongodb:27017
      - DatabaseSettings__DatabaseName=ProductDb
    depends_on:
      - mongodb

  bidmania.auctionservice:
    build:
      context: .
      dockerfile: BidMania.AuctionService/Dockerfile
    container_name: bidmania-auctionservice
    environment:
      - ConnectionStrings__DefaultConnection=mongodb://mongodb:27017
      - DatabaseSettings__DatabaseName=AuctionDb
    depends_on:
      - mongodb

volumes:
  mongo_data: